controller_manager:
  ros__parameters:
    update_rate: 30  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

my_diffbot_base_controller:
  ros__parameters:
    type: diff_drive_controller/DiffDriveController

    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.16
    wheels_per_side: 1
    wheel_radius: 0.031

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_footprint
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    position_feedback: true
    open_loop: false
    enable_odom_tf: true

    cmd_vel_timeout: 5.0 # seconds after which input command is considered staled.
    publish_limited_velocity: true
    velocity_rolling_window_size: 15 # (15 Samples) for calculation of mean velocity use in odometry.

    # Limits configuration
    linear.x.max_velocity: 0.7
    angular.z.max_velocity: 1.5

    linear.x.max_acceleration: 1.0
    angular.z.max_acceleration: 2.0
